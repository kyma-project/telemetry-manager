name: Validate Release Branch

permissions:
  contents: read

on:
  pull_request:
    branches:
      - "release-*"
      - "pre-release-*"
jobs:
  validate-envs:
    name: Validate helm/values.yaml and sec-scanners-config.yaml files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify helm/values.yaml file has no main branch references
        run: |
          if grep -q "main" helm/values.yaml; then
            echo "The helm/values.yaml file contains references to the main branch"
            exit 1
          fi

      - name: Verify sec-scanners-config.yaml file has no main branch references
        run: |
          if grep -q "main" sec-scanners-config.yaml; then
            echo "The sec-scanners-config.yaml file contains references to the main branch"
            exit 1
          fi
