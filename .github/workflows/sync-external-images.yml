name: Sync External Images

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "external-images.yaml"
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - "external-images.yaml"

jobs:
  approval:
    uses: ./.github/workflows/approval-gate.yml

  sync-external-images:
    needs: [approval]
    if: always() && (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    permissions:
      id-token: write # Required for requesting the JWT token
      contents: read
    uses: kyma-project/test-infra/.github/workflows/image-syncer.yml@main
    with:
      debug: true
