name: PR Integration

permissions:
  contents: read

on:
  schedule:
    # Run every 3 hours on main branch
    - cron: "0 */3 * * *"
  merge_group:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**.go"
      - "config/**"
      - "!config/busola/**"
      - "!**_test.go"
      - "!docs/**"
      - "test/**.go"
      - ".github/workflows/pr-integration.yml"
      - ".github/template/**"
      - ".env"
      - ".k3d-kyma.yaml"
      - "Makefile"
      - "hack/make/*.mk"
      - "helm/**"
  pull_request:
    branches:
      - "main"
      - "release-*"
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**.go"
      - "config/**"
      - "!config/busola/**"
      - "!**_test.go"
      - "!docs/**"
      - "test/**.go"
      - ".github/workflows/pr-integration.yml"
      - ".github/template/**"
      - ".env"
      - ".k3d-kyma.yaml"
      - "Makefile"
      - "hack/make/*.mk"
      - "helm/**"

  workflow_dispatch:

env:
  E2E_TEST_TIMEOUT: 60m
  # FIPS images are only available on push/schedule (not on PR due to registry restrictions)
  FIPS_IMAGE_AVAILABLE: ${{ github.event_name != 'pull_request' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      manager-image: ${{ steps.set-env.outputs.manager-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Golang
        uses: ./.github/template/setup-golang

      - name: Prepare environment variables
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/dev/telemetry-manager"
            IMAGE_TAG="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/dev/telemetry-manager"
            IMAGE_TAG="${{ github.event.merge_group.head_sha }}"
          else
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/prod/telemetry-manager"

            GIT_COMMIT_SHA=$(git rev-parse --short=8 HEAD)
            GIT_COMMIT_DATE=$(git show -s --format=%cd --date=format:'v%Y%m%d' $GIT_COMMIT_SHA)
            IMAGE_TAG="$GIT_COMMIT_DATE-$GIT_COMMIT_SHA"
          fi

          MANAGER_IMAGE="$IMAGE_REPO:$IMAGE_TAG"
          echo "manager-image=$MANAGER_IMAGE" >> $GITHUB_OUTPUT
          echo "image-repo=$IMAGE_REPO" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Manager image: $MANAGER_IMAGE"

      - name: Wait for image to be built
        shell: bash
        run: make wait-for-image
        env:
          IMAGE_REPO: "${{ steps.set-env.outputs.image-repo }}"
          IMAGE_TAG: "${{ steps.set-env.outputs.image-tag }}"
          QUERY_INTERVAL: 30

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-logs
            path: ./test/e2e/logs/...
          - name: e2e-metrics
            path: ./test/e2e/metrics/...
          - name: e2e-traces
            path: ./test/e2e/traces/...
          - name: e2e-misc
            path: ./test/e2e/misc/...
        flavor:
          - name: ""
            labels: "not experimental"
          - name: "-experimental"
            labels: "experimental"
    name: ${{ matrix.suite.name }}${{ matrix.flavor.name }}
    env:
      MANAGER_IMAGE: ${{ needs.setup.outputs.manager-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Golang
        uses: ./.github/template/setup-golang

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

      - name: Setup Google Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4

      - name: Configure Docker for Google Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker europe-docker.pkg.dev --quiet

      - name: Pull Self-monitor FIPS image
        if: github.event_name != 'pull_request'
        run: make docker-pull-self-monitor-fips-image

      - name: Provision K3D cluster
        run: make provision-k3d

      - name: Import Self-monitor FIPS image to K3D
        if: github.event_name != 'pull_request'
        run: make k3d-import-self-monitor-fips-image

      - name: Run ${{ matrix.suite.name }}${{ matrix.flavor.name }} tests
        run: |
          make e2e-test \
            E2E_TEST_PATH="${{ matrix.suite.path }}" \
            E2E_TEST_ID="${{ matrix.suite.name }}${{ matrix.flavor.name }}" \
            E2E_TEST_LABELS="${{ matrix.flavor.labels }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite.name }}${{ matrix.flavor.name }}-report
          path: junit-report-*.xml

      - name: Print pods on failure
        if: failure()
        run: |
          kubectl get pods -A
          for pod in $(kubectl get pods -n kyma-system -o name 2>/dev/null); do
            echo "=== $pod ==="
            kubectl logs -n kyma-system $pod --all-containers 2>/dev/null || true
          done

  # Upgrade and integration tests (no fips/experimental variants)
  e2e-other:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-upgrade
            path: ./test/e2e/upgrade/...
          - name: integration
            path: ./test/integration/...
    name: ${{ matrix.suite.name }}
    env:
      MANAGER_IMAGE: ${{ needs.setup.outputs.manager-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Golang
        uses: ./.github/template/setup-golang

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

      - name: Setup Google Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4

      - name: Configure Docker for Google Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker europe-docker.pkg.dev --quiet

      - name: Pull Self-monitor FIPS image
        if: github.event_name != 'pull_request'
        run: make docker-pull-self-monitor-fips-image

      - name: Provision K3D cluster
        run: make provision-k3d

      - name: Import Self-monitor FIPS image to K3D
        if: github.event_name != 'pull_request'
        run: make k3d-import-self-monitor-fips-image

      - name: Run ${{ matrix.suite.name }} tests
        run: |
          make e2e-test \
            E2E_TEST_PATH="${{ matrix.suite.path }}" \
            E2E_TEST_ID="${{ matrix.suite.name }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite.name }}-report
          path: junit-report-*.xml

      - name: Print pods on failure
        if: failure()
        run: |
          kubectl get pods -A
          for pod in $(kubectl get pods -n kyma-system -o name 2>/dev/null); do
            echo "=== $pod ==="
            kubectl logs -n kyma-system $pod --all-containers 2>/dev/null || true
          done

  # Selfmonitor tests
  selfmonitor:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - healthy
          - backpressure
          - outage
        component:
          - name: log-agent
            label: log-agent
          - name: log-gateway
            label: log-gateway
          - name: fluent-bit
            label: fluent-bit
          - name: metric-agent
            label: metric-agent
          - name: metric-gateway
            label: metric-gateway
          - name: traces
            label: traces
    name: selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }}
    env:
      MANAGER_IMAGE: ${{ needs.setup.outputs.manager-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Golang
        uses: ./.github/template/setup-golang

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

      - name: Setup Google Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Configure Docker for Google Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker europe-docker.pkg.dev --quiet

      - name: Pull Self-monitor FIPS image
        if: github.event_name != 'pull_request'
        run: make docker-pull-self-monitor-fips-image

      - name: Provision K3D cluster
        run: make provision-k3d

      - name: Import Self-monitor FIPS image to K3D
        if: github.event_name != 'pull_request'
        run: make k3d-import-self-monitor-fips-image

      - name: Run selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }} tests
        run: |
          make e2e-test \
            E2E_TEST_PATH="./test/selfmonitor/..." \
            E2E_TEST_ID="selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }}" \
            E2E_TEST_LABELS="${{ matrix.scenario }} and ${{ matrix.component.label }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }}-report
          path: junit-report-*.xml

      - name: Print pods on failure
        if: failure()
        run: |
          kubectl get pods -A
          for pod in $(kubectl get pods -n kyma-system -o name 2>/dev/null); do
            echo "=== $pod ==="
            kubectl logs -n kyma-system $pod --all-containers 2>/dev/null || true
          done

  summary:
    needs: [e2e, e2e-other, selfmonitor]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate test summary
        uses: "./.github/template/test-summary"
