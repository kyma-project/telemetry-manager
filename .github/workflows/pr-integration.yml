name: PR Integration

permissions:
  contents: read

on:
  schedule:
    # Run every 3 hours on main branch
    - cron: "0 */3 * * *"
  merge_group:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**.go"
      - "config/**"
      - "!config/busola/**"
      - "!**_test.go"
      - "!docs/**"
      - "test/**.go"
      - ".github/workflows/pr-integration.yml"
      - ".github/template/**"
      - ".env"
      - ".k3d-kyma.yaml"
      - "Makefile"
      - "hack/make/*.mk"
      - "helm/**"
  pull_request:
    branches:
      - "main"
      - "release-*"
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "**.go"
      - "config/**"
      - "!config/busola/**"
      - "!**_test.go"
      - "!docs/**"
      - "test/**.go"
      - ".github/workflows/pr-integration.yml"
      - ".github/template/**"
      - ".env"
      - ".k3d-kyma.yaml"
      - "Makefile"
      - "hack/make/*.mk"
      - "helm/**"

  workflow_dispatch:
# This is reused on release.yml so workflow_call is used.
  workflow_call:
    inputs:
      ref:
        description: "Git reference (branch, tag, or SHA) to checkout"
        type: string
        required: false
      image_tag:
        description: "Image tag to use for the tests"
        type: string
        required: false
env:
  E2E_TEST_TIMEOUT: 60m
  # FIPS images are only available on push/schedule (not on PR due to registry restrictions)
  FIPS_IMAGE_AVAILABLE: ${{ github.event_name != 'pull_request' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      manager-image: ${{ steps.set-env.outputs.manager-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: telemetry-manager:pr
          build-args: BUILD_COMMIT_SHA=${{ github.event.pull_request.head.sha }}

      - name: Save and upload image artifact
        if: github.event_name == 'pull_request'
        shell: bash
        run: docker save telemetry-manager:pr | zstd -T0 -3 > /tmp/manager-image.tar.zst

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: manager-image
          path: /tmp/manager-image.tar.zst
          retention-days: 1

      - name: Prepare environment variables
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MANAGER_IMAGE="telemetry-manager:pr"
            echo "manager-image=$MANAGER_IMAGE" >> $GITHUB_OUTPUT
            echo "Manager image: $MANAGER_IMAGE"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/dev/telemetry-manager"
            IMAGE_TAG="${{ github.event.merge_group.head_sha }}"
          elif [[ "${{ inputs.image_tag }}" ]]; then
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/prod/telemetry-manager"
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_REPO="europe-docker.pkg.dev/kyma-project/prod/telemetry-manager"

            GIT_COMMIT_SHA=$(git rev-parse --short=8 HEAD)
            GIT_COMMIT_DATE=$(git show -s --format=%cd --date=format:'v%Y%m%d' $GIT_COMMIT_SHA)
            IMAGE_TAG="$GIT_COMMIT_DATE-$GIT_COMMIT_SHA"
          fi

          if [[ -n "${IMAGE_REPO:-}" ]]; then
            MANAGER_IMAGE="$IMAGE_REPO:$IMAGE_TAG"
            echo "manager-image=$MANAGER_IMAGE" >> $GITHUB_OUTPUT
            echo "image-repo=$IMAGE_REPO" >> $GITHUB_OUTPUT
            echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "Manager image: $MANAGER_IMAGE"
          fi

      - name: Wait for image to be built
        if: github.event_name != 'pull_request'
        shell: bash
        run: make wait-for-image
        env:
          IMAGE_REPO: "${{ steps.set-env.outputs.image-repo }}"
          IMAGE_TAG: "${{ steps.set-env.outputs.image-tag }}"
          QUERY_INTERVAL: 30

  # e2e-logs split by fluent-bit vs otel AND by set labels for parallel execution
  e2e-logs:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: "-fluentbit"
            label: "fluent-bit"
          - name: "-otel"
            label: "not fluent-bit"
        set:
          - name: "-a"
            label: "set-a"
          - name: "-b"
            label: "set-b"
          - name: "-c"
            label: "set-c"
    name: e2e-logs${{ matrix.variant.name }}${{ matrix.set.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: e2e-logs${{ matrix.variant.name }}${{ matrix.set.name }}
          test-path: ./test/e2e/logs/...
          test-labels: not experimental and ${{ matrix.variant.label }} and ${{ matrix.set.label }}
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  # e2e-metrics split by set labels for parallel execution
  e2e-metrics:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        set:
          - name: "-a"
            label: "set-a"
          - name: "-b"
            label: "set-b"
          - name: "-c"
            label: "set-c"
    name: e2e-metrics${{ matrix.set.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: e2e-metrics${{ matrix.set.name }}
          test-path: ./test/e2e/metrics/...
          test-labels: not experimental and ${{ matrix.set.label }}
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  # All e2e suites with experimental flavor
  e2e-experimental:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-logs
            path: ./test/e2e/logs/...
          - name: e2e-metrics
            path: ./test/e2e/metrics/...
          - name: e2e-traces
            path: ./test/e2e/traces/...
          - name: e2e-misc
            path: ./test/e2e/misc/...
    name: ${{ matrix.suite.name }}-experimental
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: ${{ matrix.suite.name }}-experimental
          test-path: ${{ matrix.suite.path }}
          test-labels: experimental
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  # e2e-traces and e2e-misc (non-experimental) without set splitting
  e2e:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-traces
            path: ./test/e2e/traces/...
          - name: e2e-misc
            path: ./test/e2e/misc/...
    name: ${{ matrix.suite.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: ${{ matrix.suite.name }}
          test-path: ${{ matrix.suite.path }}
          test-labels: not experimental
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  # Upgrade and integration tests
  e2e-other:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-upgrade
            path: ./test/e2e/upgrade/...
          - name: integration
            path: ./test/integration/...
    name: ${{ matrix.suite.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: ${{ matrix.suite.name }}
          test-path: ${{ matrix.suite.path }}
          test-labels: ""
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  # Selfmonitor tests
  selfmonitor:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - healthy
          - backpressure
          - outage
        component:
          - name: log-agent
            label: log-agent
          - name: log-gateway
            label: log-gateway
          - name: fluent-bit
            label: fluent-bit
          - name: metric-agent
            label: metric-agent
          - name: metric-gateway
            label: metric-gateway
          - name: traces
            label: traces
    name: selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          ref: ${{ inputs.ref || github.ref }}

      - name: Run E2E test
        uses: ./.github/template/run-e2e-test
        with:
          test-id: selfmonitor-${{ matrix.scenario }}-${{ matrix.component.name }}
          test-path: ./test/selfmonitor/...
          test-labels: ${{ matrix.scenario }} and ${{ matrix.component.label }}
          manager-image: ${{ needs.setup.outputs.manager-image }}
          manager-image-archive: ${{ github.event_name == 'pull_request' && 'manager-image' || '' }}
          fips-image-available: ${{ env.FIPS_IMAGE_AVAILABLE }}
          google-credentials: ${{ secrets.GOOGLE_CLOUD_SA_KEY }}

  summary:
    needs: [e2e-logs, e2e-metrics, e2e-experimental, e2e, e2e-other, selfmonitor]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Generate test summary
        uses: "./.github/template/test-summary"
