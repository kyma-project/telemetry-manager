name: Build Manager Image

permissions:
  contents: read

on:
  merge_group:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - "main"
      - "release-[0-9]+.[0-9]+"
    paths-ignore:
      - "docs/**"
      - "dependencies/**"
      - "**/*.md"
      - "OWNERS"
      - "CODEOWNERS"
      - "external-images.yaml"
      - "renovate.json"
      - "sec-scanners-config.yaml"
      - ".hyperspace/**"
  push:
    branches:
      - "main"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "docs/**"
      - "dependencies/**"
      - "**/*.md"
      - "OWNERS"
      - "CODEOWNERS"
      - "external-images.yaml"
      - "renovate.json"
      - "sec-scanners-config.yaml"
      - ".hyperspace/**"

jobs:
  approval:
    uses: ./.github/workflows/approval-gate.yml

  envs:
    needs: [approval]
    if: always() && (needs.approval.result == 'success' || needs.approval.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.create-tags.outputs.tags }}

    steps:
      - name: Create tags
        id: create-tags
        run: |
          if [[ $GITHUB_EVENT_NAME == 'push' ]]; then
            {
              echo "tags<<EOTAGS"
              echo "${{ github.ref_name }}"
              echo "${{ github.ref_name }}-experimental"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          elif [[ $GITHUB_EVENT_NAME == 'merge_group' ]]; then
            {
              echo "tags<<EOTAGS"
              echo "${{ github.event.merge_group.head_sha }}"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOTAGS"
              echo "PR-${{ github.event.pull_request.number }}"
              echo "${{ github.event.pull_request.head.sha }}"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          fi

  build-image:
    permissions:
      id-token: write # Required for requesting the JWT token
      contents: read
    needs: [approval, envs]
    if: ${{ always() && needs.envs.result == 'success' }}
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main # Usage: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: telemetry-manager
      dockerfile: Dockerfile
      context: .
      tags: ${{ needs.envs.outputs.tags }}
      platforms: "linux/amd64,linux/arm64"
