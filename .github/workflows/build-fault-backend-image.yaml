name: Build Fault Backend Image

permissions:
  contents: read

on:
  pull_request_target:
    paths:
      - "dependencies/fault-backend/**"
    types: [labeled, opened, edited, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "dependencies/fault-backend/**"
  workflow_dispatch:

jobs:
  approval:
    if: github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'build-image')
    uses: ./.github/workflows/approval-gate.yml

  envs:
    needs: [approval]
    if: always() && (github.event_name != 'pull_request_target' || needs.approval.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.create-tags.outputs.tags }}

    steps:
      - name: Create tags
        id: create-tags
        run: |
          if [[ $GITHUB_EVENT_NAME == 'push' || $GITHUB_EVENT_NAME == 'merge_group' ]]; then
            {
              echo "tags<<EOTAGS"
              echo "main"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOTAGS"
              echo "PR-${{ github.event.pull_request.number }}"
              echo "${{ github.event.pull_request.head.sha }}"
              echo "EOTAGS"
            } >> "$GITHUB_OUTPUT"
          fi

  build-image:
    permissions:
      id-token: write # Required for requesting the JWT token
      contents: read
    needs: envs
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: fault-backend
      dockerfile: Dockerfile
      context: dependencies/fault-backend
      tags: ${{ needs.envs.outputs.tags }}
      platforms: "linux/amd64,linux/arm64"
