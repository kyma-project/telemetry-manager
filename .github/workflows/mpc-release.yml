name: Management Plane Chart Release

permissions:
  contents: read

concurrency:
  group: mpc-release-${{ inputs.target_chart }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3 for Telemetry, 1.2.3-4.5.6 for RMO)'
        required: true
        type: string
        default: ''
      target_chart:
        description: 'Target chart to release'
        required: true
        type: choice
        options:
          - Telemetry
          - RMO
      dry_run:
        description: 'Perform a dry run without creating PR'
        required: false
        default: false
        type: boolean
      auto_merge:
        description: 'Auto-merge PR after creation'
        required: false
        default: false
        type: boolean

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
          TARGET_CHART: ${{ inputs.target_chart }}
        run: |
          echo "Validating version format for target chart: ${TARGET_CHART}"
          echo "Version: ${VERSION}"

          if [ "${TARGET_CHART}" = "Telemetry" ]; then
            # Telemetry chart expects X.Y.Z format
            if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version format for Telemetry chart: ${VERSION}"
              echo "Expected format: X.Y.Z (e.g., 1.2.3)"
              exit 1
            fi
            echo "✓ Telemetry version format valid: ${VERSION}"
          elif [ "${TARGET_CHART}" = "RMO" ]; then
            # RMO chart expects X.Y.Z-A.B.C format
            if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version format for RMO chart: ${VERSION}"
              echo "Expected format: X.Y.Z-A.B.C (e.g., 1.2.3-4.5.6)"
              exit 1
            fi
            echo "✓ RMO version format valid: ${VERSION}"
          else
            echo "::error::Unknown target chart: ${TARGET_CHART}"
            exit 1
          fi

  prepare-matrix:
    runs-on: ubuntu-latest
    needs: validate-inputs
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.target_chart }}" = "Telemetry" ]; then
            cat >> "$GITHUB_OUTPUT" <<EOF
          matrix={
            "include": [{
              "chart_name": "Telemetry",
              "base_branch": "chart/telemetry",
              "branch_prefix": "bump-telemetry",
              "chart_dir": "telemetry",
              "update_command": "yq -i '.appVersion = \"${{ inputs.version }}\" ' telemetry/Chart.yaml && yq -i '.dependencies[] |= (select(.name == \"telemetry-manager\") | .version = \"${{ inputs.version }}\")' telemetry/Chart.yaml",
              "verify_command": "yq '.appVersion' telemetry/Chart.yaml",
              "verify_field": "appVersion",
              "commit_title": "Bump Telemetry to ${{ inputs.version }}",
              "pr_title": "Bump Telemetry to ${{ inputs.version }}",
              "pr_body": "Bump Telemetry chart to version ${{ inputs.version }}",
              "summary_title": "Telemetry Chart Release Summary",
              "summary_details": "Verify chart changes are correct"
            }]
          }
          EOF
          elif [ "${{ inputs.target_chart }}" = "RMO" ]; then
            cat >> "$GITHUB_OUTPUT" <<EOF
          matrix={
            "include": [{
              "chart_name": "RMO",
              "base_branch": "chart/runtime-monitoring-operator",
              "branch_prefix": "bump-rmo-occ",
              "chart_dir": "runtime-monitoring-operator",
              "update_command": "yq -i '.argosap.config.rma.image.otelCollector.tag = \"${{ inputs.version }}\"' runtime-monitoring-operator/values.yaml",
              "verify_command": "yq '.argosap.config.rma.image.otelCollector.tag' runtime-monitoring-operator/values.yaml",
              "verify_field": "OTel Collector tag",
              "commit_title": "Bump RMO OTel Collector to ${{ inputs.version }}",
              "pr_title": "Bump RMO OTel Collector to ${{ inputs.version }}",
              "pr_body": "Bump RMO OTel Collector version to ${{ inputs.version }}",
              "summary_title": "RMO OTel Collector Release Summary",
              "summary_details": "Verify OTel Collector version changes are correct"
            }]
          }
          EOF
          fi

  release-chart:
    name: Release ${{ matrix.chart_name }} Chart
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    env:
      GH_HOST: github.tools.sap
      REPO: kyma/management-plane-charts
      GH_TOKEN: ${{ secrets.HUSKIES_GHTOOLS_TOKEN }}

    steps:
      - name: Checkout code
        run: |
          rm -rf ./* ./.[!.]* ./..?*
          git clone \
            "https://x-access-token:${GH_TOKEN}@${GH_HOST}/${REPO}.git" \
            --branch ${{ matrix.base_branch }} \
            .

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Branch
        run: |
          BRANCH_NAME="${{ matrix.branch_prefix }}-${{ inputs.version }}"

          # Check if branch exists remotely
          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q "${BRANCH_NAME}"; then
            echo "Branch ${BRANCH_NAME} already exists, checking it out..."
            git fetch origin "${BRANCH_NAME}"
            git checkout "${BRANCH_NAME}"
            echo "✓ Checked out existing branch: ${BRANCH_NAME}"
          else
            echo "Creating new branch: ${BRANCH_NAME}..."
            git checkout -b "${BRANCH_NAME}"
            echo "✓ Created new branch: ${BRANCH_NAME}"
          fi

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Install yq
        run: |
          YQ_VERSION="4.44.1"
          YQ_BINARY="yq_linux_amd64"
          YQ_URL="https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/${YQ_BINARY}"
          CHECKSUMS_URL="https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/checksums"
          HASHES_ORDER_URL="https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/checksums_hashes_order"

          # Download files
          wget -q "${YQ_URL}" -O /tmp/yq
          wget -q "${CHECKSUMS_URL}" -O /tmp/checksums
          wget -q "${HASHES_ORDER_URL}" -O /tmp/checksums_hashes_order

          # Compute SHA-256 column dynamically
          HASHES_ORDER_FILE="/tmp/checksums_hashes_order"
          CHECKSUMS_FILE="/tmp/checksums"
          SHA256_LINE_NUM=$(grep -n "^SHA-256$" "${HASHES_ORDER_FILE}" | cut -d: -f1)
          SHA256_COLUMN=$((SHA256_LINE_NUM + 1))

          # Extract expected checksum
          EXPECTED_SHA256="$(grep "^${YQ_BINARY}[[:space:]]" "${CHECKSUMS_FILE}" | sed 's/  /\t/g' | cut -f${SHA256_COLUMN})"
          ACTUAL_SHA256="$(sha256sum /tmp/yq | cut -d' ' -f1)"

          # Verify checksum
          if [ "${EXPECTED_SHA256}" != "${ACTUAL_SHA256}" ]; then
            echo "::error::yq checksum mismatch"
            echo "Expected: ${EXPECTED_SHA256}"
            echo "Got:      ${ACTUAL_SHA256}"
            exit 1
          fi

          # Install yq
          chmod +x /tmp/yq
          sudo mv /tmp/yq /usr/local/bin/yq
          echo "✓ yq ${YQ_VERSION} installed and verified"

      - name: Bump chart version
        run: make bump-patch

      - name: Update chart files
        run: ${{ matrix.update_command }}

      - name: Verify changes
        run: |
          echo "Changes to be committed:"
          git diff

          if git diff --quiet; then
            echo "::error::No changes detected. Chart may already be at version ${{ inputs.version }}"
            exit 1
          fi

      - name: Verify update was applied
        run: |
          CURRENT_VERSION=$(${{ matrix.verify_command }})
          if [ "$CURRENT_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::${{ matrix.verify_field }} mismatch. Expected: ${{ inputs.version }}, Got: $CURRENT_VERSION"
            exit 1
          fi
          echo "✓ ${{ matrix.verify_field }} verified: $CURRENT_VERSION"

      - name: Commit changes
        run: |
          git add .
          git commit -m "${{ matrix.commit_title }}"

      - name: Push branch
        if: ${{ inputs.dry_run != true }}
        run: |
          git push origin ${{ matrix.branch_prefix }}-${{ inputs.version }}

      - name: Create PR
        if: ${{ inputs.dry_run != true }}
        id: create-pr
        run: |
          BRANCH_NAME="${{ matrix.branch_prefix }}-${{ inputs.version }}"

          # Check if PR already exists for this branch
          echo "Checking if PR already exists for branch: ${BRANCH_NAME}..."
          EXISTING_PR=$(gh pr list --head "${BRANCH_NAME}" --json number,url --jq '.[0] | select(.number != null)' || echo "")

          if [ -n "${EXISTING_PR}" ]; then
            PR_NUMBER=$(echo "${EXISTING_PR}" | jq -r '.number')
            PR_URL=$(echo "${EXISTING_PR}" | jq -r '.url')
            echo "::notice::PR already exists for this branch"
            echo "✓ Using existing PR #${PR_NUMBER}: ${PR_URL}"
            echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"
            echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No existing PR found. Creating new PR..."

          PR_URL=$(gh pr create \
            --base ${{ matrix.base_branch }} \
            --head "${BRANCH_NAME}" \
            --title "${{ matrix.pr_title }}" \
            --body "${{ matrix.pr_body }}" \
            --label pr-deploy)
          PR_NUMBER=$(echo "${PR_URL}" | grep -o '[0-9]*$')
          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Created PR: ${PR_URL}"

      - name: Enable auto-merge
        if: ${{ inputs.dry_run != true && inputs.auto_merge == true }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pr-number }} --auto --squash
          echo "✓ Auto-merge enabled for PR #${{ steps.create-pr.outputs.pr-number }}"

      - name: Skip PR creation (dry run)
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice::DRY RUN: Skipping PR creation"
          echo "Would have created PR with:"
          echo "  Branch: ${{ matrix.branch_prefix }}-${{ inputs.version }}"
          echo "  Title: ${{ matrix.pr_title }}"
          echo "  Label: pr-deploy"

      - name: Workflow summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${{ matrix.summary_title }}

          **Version**: ${{ inputs.version }}
          **Branch**: ${{ matrix.branch_prefix }}-${{ inputs.version }}
          **Dry Run**: ${{ inputs.dry_run }}
          **Auto Merge**: ${{ inputs.auto_merge }}
          ${{ inputs.dry_run != true && format('**PR**: {0}', steps.create-pr.outputs.pr-url) || '' }}

          ### Next Steps
          ${{ inputs.dry_run == true && '- Re-run workflow with dry_run=false to create PR' || format('1. Review the PR at {0}', steps.create-pr.outputs.pr-url) }}
          ${{ inputs.dry_run != true && format('2. {0}', matrix.summary_details) || '' }}
          ${{ inputs.dry_run != true && inputs.auto_merge != true && '3. Merge the PR to deploy' || '' }}
          ${{ inputs.dry_run != true && inputs.auto_merge == true && '3. PR will auto-merge when checks pass' || '' }}
          EOF
