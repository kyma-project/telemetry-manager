name: Telemetry Module Release

permissions:
  contents: read

concurrency:
  group: module-release-${{ inputs.channel }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      channel:
        description: 'Release channel (regular, fast, experimental)'
        required: true
        type: choice
        options:
          - regular
          - fast
          - experimental
      dry_run:
        description: 'Dry run mode (skip PR creation and push)'
        required: false
        type: boolean
        default: false
      auto_merge:
        description: 'Enable auto-merge on created PR'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      channel:
        description: 'Release channel (regular, fast, experimental)'
        required: true
        type: string
      dry_run:
        description: 'Dry run mode (skip PR creation and push)'
        required: false
        type: boolean
        default: false
      auto_merge:
        description: 'Enable auto-merge on created PR'
        required: false
        type: boolean
        default: false
    secrets:
      HUSKIES_GHTOOLS_TOKEN:
        description: 'GitHub token for accessing github.tools.sap'
        required: true

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "Validating version format..."
          echo "Version: ${VERSION}"

          # Validate version format (X.Y.Z)
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION}"
            echo "Expected format: X.Y.Z (e.g., 1.2.3)"
            exit 1
          fi
          echo "✓ Version format valid: ${VERSION}"

      - name: Validate channel
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          echo "Validating release channel..."
          echo "Channel: ${CHANNEL}"
          case "${CHANNEL}" in
            regular|fast|experimental)
              echo "✓ Channel valid: ${CHANNEL}"
              ;;
            *)
              echo "::error::Invalid channel: ${CHANNEL}"
              echo "Allowed values: regular, fast, experimental"
              exit 1
              ;;
          esac

      - name: Validate tag exists in telemetry-manager
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "Checking if tag ${VERSION} exists in telemetry-manager repository..."

          if ! git ls-remote --tags https://github.com/kyma-project/telemetry-manager.git | grep -q "refs/tags/${VERSION}$"; then
            echo "::error::Tag ${VERSION} does not exist in kyma-project/telemetry-manager repository"
            echo "Please ensure the tag is created before releasing the module"
            exit 1
          fi

          echo "✓ Tag ${VERSION} exists in telemetry-manager repository"

  release-module:
    name: Release Telemetry Module
    needs: validate-inputs
    runs-on: ubuntu-latest
    env:
      GH_HOST: github.tools.sap
      GH_REPO: kyma/module-manifests
    steps:
      - name: Checkout telemetry-manager (for scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: telemetry-manager

      - name: Checkout module-manifests (working repository)
        env:
          GH_TOKEN: ${{ secrets.HUSKIES_GHTOOLS_TOKEN }}
        run: |
          # Configure git to use token from environment without exposing it in URLs
          git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=$GH_TOKEN"; }; f'

          # Clone using HTTPS without token in URL
          rm -rf module-manifests
          git clone \
            "https://${GH_HOST}/${GH_REPO}.git" \
            --branch main \
            module-manifests

          # Clean up global credential helper
          git config --global --unset credential.helper

      - name: Install yq
        run: telemetry-manager/hack/install-yq.sh

      - name: Configure git
        working-directory: module-manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reuse branch
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          BRANCH_NAME="bump-telemetry-${VERSION}-${CHANNEL}"

          echo "Checking if branch ${BRANCH_NAME} exists on remote..."
          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q "refs/heads/${BRANCH_NAME}$"; then
            echo "Branch ${BRANCH_NAME} exists on remote, checking it out..."
            git fetch origin "${BRANCH_NAME}"
            # Create local branch tracking the remote branch
            git checkout -B "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
            echo "✓ Checked out existing branch ${BRANCH_NAME} from origin/${BRANCH_NAME}"
          else
            echo "Branch ${BRANCH_NAME} does not exist, creating new branch..."
            git checkout -b "${BRANCH_NAME}"
            echo "✓ Created new branch ${BRANCH_NAME}"
          fi

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: python3 -m pip install semver

      - name: Check for duplicate version
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          ../telemetry-manager/hack/module-release.sh check-duplicate "${VERSION}" "${CHANNEL}"

      - name: Setup version folder
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          ../telemetry-manager/hack/module-release.sh setup-folder "${VERSION}" "${CHANNEL}"

      - name: Update module-config.yaml
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          ../telemetry-manager/hack/module-release.sh update-config "${VERSION}" "${CHANNEL}"

      - name: Update module-releases.yaml
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          ../telemetry-manager/hack/module-release.sh update-releases "${VERSION}" "${CHANNEL}"

      - name: Verify changes
        working-directory: module-manifests
        run: |
          echo "Changes to be committed:"
          git status
          echo ""
          echo "Diff:"
          git diff

          # Check for any changes including untracked files
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::No changes detected. Module may already be at version ${{ inputs.version }}"
            exit 1
          fi

          echo "✓ Changes detected and ready to commit"

      - name: Commit changes
        if: ${{ !inputs.dry_run }}
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          git add .
          COMMIT_MSG="bump telemetry version to ${VERSION} on ${CHANNEL}"
          git commit -m "${COMMIT_MSG}"
          echo "✓ Committed changes with message: ${COMMIT_MSG}"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          echo "🔍 DRY RUN MODE - No changes will be committed or pushed"
          echo ""
          echo "Would commit with message:"
          echo "  bump telemetry version to ${VERSION} on ${CHANNEL}"

      - name: Push branch
        if: ${{ !inputs.dry_run }}
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          BRANCH_NAME="bump-telemetry-${VERSION}-${CHANNEL}"

          # Check if branch exists on remote
          if git ls-remote --heads origin "${BRANCH_NAME}" | grep -q "refs/heads/${BRANCH_NAME}$"; then
            echo "Branch ${BRANCH_NAME} exists on remote, force pushing to update..."
            git push --force-with-lease origin "${BRANCH_NAME}"
            echo "✓ Force pushed branch: ${BRANCH_NAME}"
          else
            echo "Branch ${BRANCH_NAME} does not exist on remote, pushing..."
            git push -u origin "${BRANCH_NAME}"
            echo "✓ Pushed branch: ${BRANCH_NAME}"
          fi

      - name: Create PR
        if: ${{ !inputs.dry_run }}
        working-directory: module-manifests
        id: create-pr
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.HUSKIES_GHTOOLS_TOKEN }}
        run: |
          # Create temporary file for script output
          OUTPUT_FILE=$(mktemp)

          # Run PR creation script
          ../telemetry-manager/hack/create-module-release-pr.sh "${VERSION}" "${CHANNEL}" "${OUTPUT_FILE}"

          # Read outputs and set them for GitHub Actions
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < "${OUTPUT_FILE}"

          rm -f "${OUTPUT_FILE}"

      - name: Enable auto-merge
        if: ${{ !inputs.dry_run && inputs.auto_merge }}
        working-directory: module-manifests
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ secrets.HUSKIES_GHTOOLS_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pr-number }}"

          echo "Enabling auto-merge for PR #${PR_NUMBER}..."
          gh pr merge "${PR_NUMBER}" --auto --squash
          echo "✓ Auto-merge enabled for PR #${PR_NUMBER}"

      - name: Workflow summary
        if: always()
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          DRY_RUN: ${{ inputs.dry_run }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
        run: |
          if [ "${CHANNEL}" = "experimental" ]; then
            VERSION_TAG="${VERSION}-experimental"
            FOLDER_PATH="modules/telemetry/${VERSION}-experimental"
          else
            VERSION_TAG="${VERSION}"
            FOLDER_PATH="modules/telemetry/${VERSION}"
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Telemetry Module Release Summary

          **Version**: ${VERSION}
          **Channel**: ${CHANNEL}
          **Version Tag**: ${VERSION_TAG}
          **Folder**: ${FOLDER_PATH}
          **Branch**: bump-telemetry-${VERSION}-${CHANNEL}
          **Dry Run**: ${DRY_RUN}
          **Auto-Merge**: ${AUTO_MERGE}
          EOF

          if [ "${DRY_RUN}" = "false" ]; then
            cat >> $GITHUB_STEP_SUMMARY <<EOF
          **PR**: ${{ steps.create-pr.outputs.pr-url }}
          EOF
          fi

          cat >> $GITHUB_STEP_SUMMARY <<EOF

          ### Changes Made
          - Created/Updated module folder: \`${FOLDER_PATH}\`
          - Updated \`module-config.yaml\`:
            - \`.version\` = \`${VERSION_TAG}\`
            - \`.repositoryTag\` = \`${VERSION}\`
          - Updated \`module-releases.yaml\`:
            - \`channels.${CHANNEL}.version\` = \`${VERSION_TAG}\`
          EOF

          if [ "${DRY_RUN}" = "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY <<EOF

          ### Dry Run Mode
          🔍 **No changes were committed or pushed**
          - Local branch created but not pushed to remote
          - Changes applied locally but not committed
          - PR was not created
          - Use this mode to validate the workflow logic
          EOF
          elif [ "${AUTO_MERGE}" = "true" ]; then
            cat >> $GITHUB_STEP_SUMMARY <<EOF

          ### Next Steps
          1. Auto-merge is enabled on PR ${{ steps.create-pr.outputs.pr-url }}
          2. PR will be merged automatically once all checks pass
          3. Module will be published after merge
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY <<EOF

          ### Next Steps
          1. Review the PR at ${{ steps.create-pr.outputs.pr-url }}
          2. Verify the module-config.yaml and module-releases.yaml changes
          3. Merge the PR to publish the module
          EOF
          fi
