name: PR Helm Checks

permissions:
  contents: read

on:
  merge_group:
  pull_request:
    branches:
      - "main"
      - "release-*"
      - "pre-release-*"
    paths:
      - "helm/**"
      - ".github/workflows/pr-helm-checks.yml"
  workflow_dispatch:

jobs:
  helm-kubeconform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Golang
        uses: "./.github/template/setup-golang"

      - name: Validate Helm templates with kubeconform
        run: make check-kubeconform
