name: Run E2E Test
description: Complete E2E test execution including setup, test run, and cleanup

inputs:
  test-id:
    description: Unique identifier for the test run (used for artifacts and reporting)
    required: true
  test-path:
    description: Go test path (e.g., ./test/e2e/logs/...)
    required: true
  test-labels:
    description: Label filter expression for test selection
    required: false
    default: ""
  manager-image:
    description: Telemetry Manager image to use
    required: true
  manager-image-archive:
    description: Name of the GitHub Actions artifact containing the manager image tar (for PR builds)
    required: false
    default: ""
  fips-image-available:
    description: Whether FIPS images are available (for pulling/importing)
    required: false
    default: "false"
  google-credentials:
    description: Google Cloud credentials JSON (required when fips-image-available is true)
    required: false
    default: ""
  artifact-prefix:
    description: Prefix for artifact names (e.g., "pr-", "gardener-")
    required: false
    default: ""

runs:
  using: "composite"

  steps:
    - name: Setup Golang
      uses: ./.github/template/setup-golang

    - name: Add tools bin to PATH
      shell: bash
      run: echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

    - name: Download manager image artifact
      if: inputs.manager-image-archive != ''
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.manager-image-archive }}
        path: /tmp

    - name: Load manager image
      if: inputs.manager-image-archive != ''
      shell: bash
      run: zstd -d /tmp/manager-image.tar.zst --stdout | docker load

    - name: Authenticate to Google Cloud
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        credentials_json: ${{ inputs.google-credentials }}

    - name: Setup Google Cloud SDK
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

    - name: Configure Docker for Google Artifact Registry
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: gcloud auth configure-docker europe-docker.pkg.dev --quiet

    - name: Pull Self-monitor FIPS image
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: make docker-pull-self-monitor-fips-image

    - name: Provision K3D cluster
      shell: bash
      run: make provision-k3d

    - name: Import Self-monitor FIPS image to K3D
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: make k3d-import-self-monitor-fips-image

    - name: Run tests
      shell: bash
      run: |
        make e2e-test \
          E2E_TEST_PATH="${{ inputs.test-path }}" \
          E2E_TEST_ID="${{ inputs.test-id }}" \
          E2E_TEST_LABELS="${{ inputs.test-labels }}"
      env:
        MANAGER_IMAGE: ${{ inputs.manager-image }}
        FIPS_IMAGE_AVAILABLE: ${{ inputs.fips-image-available }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-prefix }}${{ inputs.test-id }}-report
        path: junit-report-*.xml

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-prefix }}${{ inputs.test-id }}-artifacts
        path: test-artifacts/
        if-no-files-found: ignore

    - name: Print test artifacts on failure
      if: failure()
      shell: bash
      run: |
        if [ ! -d test-artifacts ] || [ -z "$(ls -A test-artifacts)" ]; then
          echo "No test artifacts found."
          exit 0
        fi
        for dir in test-artifacts/*/; do
          test_name=$(basename "$dir")
          echo "::group::${test_name}"
          for f in "${dir}"*.txt "${dir}"*.yaml; do
            [ -f "$f" ] || continue
            echo "--- $(basename "$f") ---"
            cat "$f"
            echo ""
          done
          echo "::endgroup::"
        done
