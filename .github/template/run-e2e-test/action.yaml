name: Run E2E Test
description: Complete E2E test execution including setup, test run, and cleanup

inputs:
  test-id:
    description: Unique identifier for the test run (used for artifacts and reporting)
    required: true
  test-path:
    description: Go test path (e.g., ./test/e2e/logs/...)
    required: true
  test-labels:
    description: Label filter expression for test selection
    required: false
    default: ""
  manager-image:
    description: Telemetry Manager image to use
    required: true
  fips-image-available:
    description: Whether FIPS images are available (for pulling/importing)
    required: false
    default: "false"
  google-credentials:
    description: Google Cloud credentials JSON (required when fips-image-available is true)
    required: false
    default: ""

runs:
  using: "composite"

  steps:
    - name: Setup Golang
      uses: ./.github/template/setup-golang

    - name: Authenticate to Google Cloud
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        credentials_json: ${{ inputs.google-credentials }}

    - name: Setup Google Cloud SDK
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

    - name: Configure Docker for Google Artifact Registry
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: gcloud auth configure-docker europe-docker.pkg.dev --quiet

    - name: Pull Self-monitor FIPS image
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: make docker-pull-self-monitor-fips-image

    - name: Provision K3D cluster
      shell: bash
      run: make provision-k3d

    - name: Import Self-monitor FIPS image to K3D
      if: inputs.fips-image-available == 'true' && inputs.google-credentials != ''
      shell: bash
      run: make k3d-import-self-monitor-fips-image

    - name: Run tests
      shell: bash
      run: |
        make e2e-test \
          E2E_TEST_PATH="${{ inputs.test-path }}" \
          E2E_TEST_ID="${{ inputs.test-id }}" \
          E2E_TEST_LABELS="${{ inputs.test-labels }}"
      env:
        MANAGER_IMAGE: ${{ inputs.manager-image }}
        FIPS_IMAGE_AVAILABLE: ${{ inputs.fips-image-available }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test-id }}-report
        path: junit-report-*.xml

    - name: Print pods on failure
      if: failure()
      shell: bash
      run: |
        kubectl get pods -A
        for pod in $(kubectl get pods -n kyma-system -o name 2>/dev/null); do
          echo "=== $pod ==="
          kubectl logs -n kyma-system $pod --all-containers 2>/dev/null || true
        done
