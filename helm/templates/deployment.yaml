apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telemetry-manager.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "telemetry-manager.labels" . | nindent 4 }}
  {{- if not (empty .Values.manager.labels) }}
  {{- toYaml .Values.manager.labels | nindent 4 }}
  {{- end }}
  {{- if not (empty .Values.manager.annotations) }}
  annotations:
  {{- toYaml .Values.manager.annotations | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
    {{- include "telemetry-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
      {{- include "telemetry-manager.podLabels" . | nindent 8 }}
      {{- if not (empty .Values.manager.labels) }}
      {{- toYaml .Values.manager.labels | nindent 8 }}
      {{- end }}
      {{- if not (empty .Values.manager.pod.labels) }}
      {{- toYaml .Values.manager.pod.labels | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        sidecar.istio.io/inject: "false"
      {{- if not (empty .Values.manager.annotations) }}
      {{- toYaml .Values.manager.annotations | nindent 8 }}
      {{- end }}
      {{- if not (empty .Values.manager.pod.annotations) }}
      {{- toYaml .Values.manager.pod.annotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.global.imagePullSecret.enabled }}
      imagePullSecrets:
      - name: {{ .Values.global.imagePullSecret.name }}
      {{- end }}
      containers:
      - args:
        {{- range $key, $value := .Values.manager.container.args }}
        - --{{ $key }}={{ $value }}
        {{- end }}
        {{- if not (empty .Values.managedResources.workload.labels) }}
        {{- range $k, $v := .Values.managedResources.workload.labels }}
        - --additional-workload-label={{ (printf "%s=%s" $k $v) }}
        {{- end }}
        {{- end }}
        {{- if not (empty .Values.managedResources.workload.annotations) }}
        {{- range $k, $v := .Values.managedResources.workload.annotations }}
        - --additional-workload-annotation={{ (printf "%s=%s" $k $v) }}
        {{- end }}
        {{- end }}
        {{- if not (empty .Values.managedResources.workload.pod.labels) }}
        {{- range $k, $v := .Values.managedResources.workload.pod.labels }}
        - --additional-workload-pod-label={{ (printf "%s=%s" $k $v) }}
        {{- end }}
        {{- end }}
        {{- if not (empty .Values.managedResources.workload.pod.annotations) }}
        {{- range $k, $v := .Values.managedResources.workload.pod.annotations }}
        - --additional-workload-pod-annotation={{ (printf "%s=%s" $k $v) }}
        {{- end }}
        {{- end }}
        {{- if .Values.global.imagePullSecret.enabled }}
        - --image-pull-secret-name={{ .Values.global.imagePullSecret.name }}
        {{- end }}
        {{- if .Values.global.caBundle.enabled }}
        - --cluster-trust-bundle-name={{ .Values.global.caBundle.name }}
        {{- end }}
        {{- if .Values.experimental.enabled }}
        - --deploy-otlp-gateway=true
        - --unlimited-pipelines=true
        {{- end }}
        command:
        - /manager
        env:
        - name: GOMEMLIMIT
          value: {{ quote .Values.manager.container.env.gomemlimit }}
        - name: APP_LOG_LEVEL
          value: {{ quote .Values.manager.container.env.appLogLevel }}
        - name: MANAGER_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: TARGET_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: FLUENT_BIT_IMAGE
          value: {{ quote .Values.manager.container.env.fluentBitImage }}
        - name: FLUENT_BIT_EXPORTER_IMAGE
          value: {{ quote .Values.manager.container.env.fluentBitExporterImage }}
        - name: OTEL_COLLECTOR_IMAGE
          value: {{ quote .Values.manager.container.env.otelCollectorImage }}
        - name: SELF_MONITOR_IMAGE
          value: {{ quote .Values.manager.container.env.selfMonitorImage }}
        - name: SELF_MONITOR_FIPS_IMAGE
          value: {{ quote .Values.manager.container.env.selfMonitorFIPSImage }}
        - name: ALPINE_IMAGE
          value: {{ quote .Values.manager.container.env.alpineImage }}
        {{- if .Values.manager.container.env.operateInFipsMode }}
        - name: KYMA_FIPS_MODE_ENABLED
          value: {{ quote .Values.manager.container.env.operateInFipsMode }}
        {{- end }}
        image: {{ .Values.manager.container.image.repository }}
        imagePullPolicy: {{ .Values.manager.container.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.manager.container.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.manager.container.securityContext | nindent 10 }}
        volumeMounts:
        - mountPath: /tmp
          name: crt-volume
      priorityClassName: telemetry-priority-class
      securityContext: {{- toYaml .Values.manager.securityContext | nindent 8 }}
      serviceAccountName: {{ include "telemetry-manager.fullname" . }}-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: crt-volume



