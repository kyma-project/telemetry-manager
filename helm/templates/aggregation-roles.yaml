---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-telemetry-view
  labels:
    app.kubernetes.io/part-of: telemetry
    kyma-project.io/module: telemetry
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  {{- include "telemetry-manager.labels" . | indent 4 }}
rules:
  # Cluster-scoped telemetry resources
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines
      - metricpipelines
      - tracepipelines
    verbs:
      - get
      - list
      - watch
  # Read-only access to status subresource (for monitoring pipeline health)
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines/status
      - metricpipelines/status
      - tracepipelines/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries/status
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyma-telemetry-view
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: telemetry
    kyma-project.io/module: telemetry
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  {{- include "telemetry-manager.labels" . | indent 4 }}
rules:
  # Namespace-scoped telemetry ConfigMaps
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - telemetry-logpipelines
      - telemetry-tracepipelines
      - telemetry-metricpipelines
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-telemetry-edit
  labels:
    app.kubernetes.io/part-of: telemetry
    kyma-project.io/module: telemetry
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  {{- include "telemetry-manager.labels" . | indent 4 }}
rules:
  # Cluster-scoped telemetry resources - full CRUD access
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines
      - metricpipelines
      - tracepipelines
    verbs:
      - create
      - delete
      - deletecollection
      - get
      - list
      - patch
      - update
      - watch
  # Read-only access to status subresource
  # Note: Status is managed by the controller and manual edits would be reverted
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines/status
      - metricpipelines/status
      - tracepipelines/status
    verbs:
      - get
      - list
      - watch
  # Finalizer subresource - needed for deletion of resources with finalizers
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines/finalizers
      - metricpipelines/finalizers
      - tracepipelines/finalizers
    verbs:
      - update
  # Telemetry CR (operator.kyma-project.io) - limited access
  # Note: Telemetry CR is managed by Lifecycle Manager, not by end users
  # - Users can patch/update to configure module settings (e.g., trace collector replicas)
  # - Users CANNOT create/delete as it would be restored by Lifecycle Manager
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries/status
    verbs:
      - get
      - list
      - watch
