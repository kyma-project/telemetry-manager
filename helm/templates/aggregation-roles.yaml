---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-telemetry-view
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  {{- include "telemetry-manager.labels" . | nindent 4 }}
rules:
  # Cluster-scoped telemetry resources
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines
      - metricpipelines
      - tracepipelines
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyma-telemetry-view
  namespace: {{ .Release.Namespace }}
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  {{- include "telemetry-manager.labels" . | nindent 4 }}
rules:
  # Namespace-scoped telemetry ConfigMaps
  - apiGroups:
      - ""
    resources:
      - configmaps
    resourceNames:
      - telemetry-logpipelines
      - telemetry-tracepipelines
      - telemetry-metricpipelines
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyma-telemetry-edit
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
  {{- include "telemetry-manager.labels" . | nindent 4 }}
rules:
  # Cluster-scoped telemetry resources - full CRUD access
  # Note: 'update' permission on main resource also grants ability to update status
  # Manual status edits will be automatically reverted by the controller during reconciliation
  - apiGroups:
      - telemetry.kyma-project.io
    resources:
      - logpipelines
      - metricpipelines
      - tracepipelines
    verbs:
      - create
      - delete
      - deletecollection
      - patch
      - update
  # Telemetry CR (operator.kyma-project.io) - limited access
  # Note: Telemetry CR is managed by Lifecycle Manager, not by end users
  # - Users can patch/update to configure module settings (e.g., trace collector replicas)
  # - Users CANNOT create/delete as it would be restored by Lifecycle Manager
  - apiGroups:
      - operator.kyma-project.io
    resources:
      - telemetries
    verbs:
      - create
      - delete
      - deletecollection
      - patch
      - update
