apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    test-anno-key: test-anno-value
  labels:
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: telemetry-manager
    app.kubernetes.io/name: telemetry-otlp-gateway
    app.kubernetes.io/part-of: telemetry
    kyma-project.io/module: telemetry
    test-label-key: test-label-value
  name: telemetry-otlp-gateway
  namespace: kyma-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: telemetry-otlp-gateway
  template:
    metadata:
      annotations:
        checksum/config: 1d8e9f768e6b24485bbdd6b9aa417d37fec897a7dafc8321355abc0d45259c9e
      labels:
        app.kubernetes.io/component: gateway
        app.kubernetes.io/managed-by: telemetry-manager
        app.kubernetes.io/name: telemetry-otlp-gateway
        app.kubernetes.io/part-of: telemetry
        kyma-project.io/module: telemetry
        sidecar.istio.io/inject: "true"
        telemetry.kyma-project.io/log-export: "true"
        telemetry.kyma-project.io/log-ingest: "true"
        telemetry.kyma-project.io/metric-export: "true"
        telemetry.kyma-project.io/metric-ingest: "true"
        telemetry.kyma-project.io/trace-export: "true"
        telemetry.kyma-project.io/trace-ingest: "true"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: telemetry-otlp-gateway
              topologyKey: kubernetes.io/hostname
            weight: 100
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: telemetry-otlp-gateway
              topologyKey: topology.kubernetes.io/zone
            weight: 100
      containers:
      - args:
        - --config=/conf/relay.conf
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: GODEBUG
          value: fips140=off
        envFrom:
        - secretRef:
            name: telemetry-otlp-gateway
            optional: true
        image: opentelemetry/collector:dummy
        livenessProbe:
          httpGet:
            path: /
            port: 13133
        name: collector
        readinessProbe:
          httpGet:
            path: /
            port: 13133
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 400m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /conf
          name: config
        - mountPath: /etc/ssl/certs
          name: custom-ca-bundle
          readOnly: true
      imagePullSecrets:
      - name: mySecret
      priorityClassName: normal
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: telemetry-otlp-gateway
      volumes:
      - configMap:
          items:
          - key: relay.conf
            path: relay.conf
          name: telemetry-otlp-gateway
        name: config
      - name: custom-ca-bundle
        projected:
          sources:
          - clusterTrustBundle:
              name: trustBundle
              path: ca-certificates.crt
  updateStrategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
status:
  currentNumberScheduled: 0
  desiredNumberScheduled: 0
  numberMisscheduled: 0
  numberReady: 0
