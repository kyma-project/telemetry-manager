extensions:
    cgroupruntime:
        gomaxprocs:
            enabled: false
        gomemlimit:
            enabled: true
            ratio: 0.8
    health_check:
        endpoint: ${MY_POD_IP}:13133
    k8s_leader_elector:
        auth_type: serviceAccount
        lease_name: telemetry-metric-gateway-kymastats
        lease_namespace: kyma-system
    pprof:
        endpoint: 127.0.0.1:1777
service:
    pipelines:
        logs/test-log-1:
            receivers:
                - otlp
            processors:
                - memory_limiter
                - transform/set-observed-time-if-zero
                - k8s_attributes
                - istio_noise_filter
                - transform/insert-cluster-attributes
                - service_enrichment
                - transform/drop-kyma-attributes
                - istio_enrichment
                - transform/log-user-defined-test-log-1
                - batch
            exporters:
                - otlp_grpc/log-test-log-1
        logs/test-log-2:
            receivers:
                - otlp
            processors:
                - memory_limiter
                - transform/set-observed-time-if-zero
                - k8s_attributes
                - istio_noise_filter
                - transform/insert-cluster-attributes
                - service_enrichment
                - transform/drop-kyma-attributes
                - istio_enrichment
                - transform/log-user-defined-test-log-2
                - batch
            exporters:
                - otlp_grpc/log-test-log-2
        metrics/enrichment:
            receivers:
                - forward/input
            processors:
                - memory_limiter
                - transform/set-instrumentation-scope-kyma
                - k8s_attributes
                - service_enrichment
                - transform/insert-cluster-attributes
            exporters:
                - forward/enrichment
        metrics/input-kyma-stats:
            receivers:
                - kymastats
            processors:
                - transform/set-kyma-input-name-kyma
            exporters:
                - forward/input
        metrics/input-otlp:
            receivers:
                - otlp
            processors:
                - transform/set-kyma-input-name-otlp
            exporters:
                - forward/input
        metrics/test-metric-1-output:
            receivers:
                - forward/enrichment
            processors:
                - transform/drop-kyma-attributes
                - transform/metric-user-defined-test-metric-1
                - batch
            exporters:
                - otlp_grpc/metric-test-metric-1
        metrics/test-metric-2-output:
            receivers:
                - forward/enrichment
            processors:
                - transform/drop-kyma-attributes
                - transform/metric-user-defined-test-metric-2
                - batch
            exporters:
                - otlp_grpc/metric-test-metric-2
        traces/test-trace-1:
            receivers:
                - otlp
            processors:
                - memory_limiter
                - k8s_attributes
                - istio_noise_filter
                - transform/insert-cluster-attributes
                - service_enrichment
                - transform/drop-kyma-attributes
                - transform/trace-user-defined-test-trace-1
                - batch
            exporters:
                - otlp_grpc/trace-test-trace-1
        traces/test-trace-2:
            receivers:
                - otlp
            processors:
                - memory_limiter
                - k8s_attributes
                - istio_noise_filter
                - transform/insert-cluster-attributes
                - service_enrichment
                - transform/drop-kyma-attributes
                - transform/trace-user-defined-test-trace-2
                - batch
            exporters:
                - otlp_grpc/trace-test-trace-2
    telemetry:
        metrics:
            readers:
                - pull:
                    exporter:
                        prometheus:
                            host: ${MY_POD_IP}
                            port: 8888
        logs:
            level: info
            encoding: json
    extensions:
        - health_check
        - pprof
        - cgroupruntime
        - k8s_leader_elector
receivers:
    kymastats:
        auth_type: serviceAccount
        collection_interval: 30s
        resources:
            - group: operator.kyma-project.io
              version: v1beta1
              resource: telemetries
            - group: telemetry.kyma-project.io
              version: v1beta1
              resource: logpipelines
            - group: telemetry.kyma-project.io
              version: v1beta1
              resource: tracepipelines
            - group: telemetry.kyma-project.io
              version: v1beta1
              resource: metricpipelines
        k8s_leader_elector: k8s_leader_elector
    otlp:
        protocols:
            http:
                endpoint: ${MY_POD_IP}:4318
            grpc:
                endpoint: ${MY_POD_IP}:4317
processors:
    batch:
        send_batch_size: 512
        timeout: 10s
        send_batch_max_size: 512
    istio_enrichment:
        scope_version: 1.0.0
    istio_noise_filter: {}
    k8s_attributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
            metadata:
                - k8s.pod.name
                - k8s.node.name
                - k8s.namespace.name
                - k8s.deployment.name
                - k8s.statefulset.name
                - k8s.daemonset.name
                - k8s.cronjob.name
                - k8s.job.name
            labels:
                - from: pod
                  key: app.kubernetes.io/name
                  tag_name: kyma.kubernetes_io_app_name
                - from: pod
                  key: app
                  tag_name: kyma.app_name
                - from: node
                  key: topology.kubernetes.io/region
                  tag_name: cloud.region
                - from: node
                  key: topology.kubernetes.io/zone
                  tag_name: cloud.availability_zone
                - from: node
                  key: node.kubernetes.io/instance-type
                  tag_name: host.type
                - from: node
                  key: kubernetes.io/arch
                  tag_name: host.arch
        pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            - sources:
                - from: resource_attribute
                  name: k8s.pod.uid
            - sources:
                - from: connection
    memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    service_enrichment:
        resource_attributes:
            - kyma.kubernetes_io_app_name
            - kyma.app_name
    transform/drop-kyma-attributes:
        error_mode: ignore
        trace_statements:
            - statements:
                - delete_matching_keys(resource.attributes, "kyma.*")
    transform/insert-cluster-attributes:
        error_mode: ignore
        trace_statements:
            - statements:
                - set(resource.attributes["k8s.cluster.name"], "${KUBERNETES_SERVICE_HOST}") where resource.attributes["k8s.cluster.name"] == nil or resource.attributes["k8s.cluster.name"] == ""
                - set(resource.attributes["k8s.cluster.uid"], "") where resource.attributes["k8s.cluster.uid"] == nil or resource.attributes["k8s.cluster.uid"] == ""
                - set(resource.attributes["cloud.provider"], "test-cloud-provider") where resource.attributes["cloud.provider"] == nil or resource.attributes["cloud.provider"] == ""
    transform/log-user-defined-test-log-1:
        error_mode: ignore
        log_statements:
            - statements:
                - set(attributes["log.level"], "error")
                - set(body, "transformed1")
              conditions:
                - IsMatch(body, ".*error.*")
    transform/log-user-defined-test-log-2:
        error_mode: ignore
        log_statements:
            - statements:
                - set(attributes["log.level"], "error")
                - set(body, "transformed2")
              conditions:
                - IsMatch(body, ".*error.*")
    transform/metric-user-defined-test-metric-1:
        error_mode: ignore
        metric_statements:
            - statements:
                - set(attributes["metric.status"], "error")
                - set(body, "transformed1")
              conditions:
                - IsMatch(body, ".*error.*")
    transform/metric-user-defined-test-metric-2:
        error_mode: ignore
        metric_statements:
            - statements:
                - set(attributes["metric.status"], "error")
                - set(body, "transformed2")
              conditions:
                - IsMatch(body, ".*error.*")
    transform/set-instrumentation-scope-kyma:
        error_mode: ignore
        metric_statements:
            - statements:
                - set(scope.version, "1.0.0") where scope.name == "github.com/kyma-project/opentelemetry-collector-components/receiver/kymastatsreceiver"
                - set(scope.name, "io.kyma-project.telemetry/kyma") where scope.name == "github.com/kyma-project/opentelemetry-collector-components/receiver/kymastatsreceiver"
    transform/set-kyma-input-name-kyma:
        error_mode: ignore
        metric_statements:
            - statements:
                - set(resource.attributes["kyma.input.name"], "kyma")
    transform/set-kyma-input-name-otlp:
        error_mode: ignore
        metric_statements:
            - statements:
                - set(resource.attributes["kyma.input.name"], "otlp")
    transform/set-observed-time-if-zero:
        error_mode: ignore
        log_statements:
            - statements:
                - set(log.observed_time, Now())
              conditions:
                - log.observed_time_unix_nano == 0
    transform/trace-user-defined-test-trace-1:
        error_mode: ignore
        trace_statements:
            - statements:
                - set(attributes["trace.status_code"], "error")
                - set(body, "transformed1")
              conditions:
                - IsMatch(body, ".*error.*")
    transform/trace-user-defined-test-trace-2:
        error_mode: ignore
        trace_statements:
            - statements:
                - set(attributes["trace.status_code"], "error")
                - set(body, "transformed2")
              conditions:
                - IsMatch(body, ".*error.*")
exporters:
    otlp_grpc/log-test-log-1:
        endpoint: ${OTLP_ENDPOINT_LOG_TEST_LOG_1}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
    otlp_grpc/log-test-log-2:
        endpoint: ${OTLP_ENDPOINT_LOG_TEST_LOG_2}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
    otlp_grpc/metric-test-metric-1:
        endpoint: ${OTLP_ENDPOINT_METRIC_TEST_METRIC_1}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
    otlp_grpc/metric-test-metric-2:
        endpoint: ${OTLP_ENDPOINT_METRIC_TEST_METRIC_2}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
    otlp_grpc/trace-test-trace-1:
        endpoint: ${OTLP_ENDPOINT_TRACE_TEST_TRACE_1}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
    otlp_grpc/trace-test-trace-2:
        endpoint: ${OTLP_ENDPOINT_TRACE_TEST_TRACE_2}
        compression: gzip
        sending_queue:
            enabled: true
            queue_size: 128
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
connectors:
    forward/enrichment: {}
    forward/input: {}
